<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Template Replacer - Adobe Workflow</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../theme.css">
    <script src="../theme-toggle.js"></script>
</head>

<body class="dark-theme">
    <div id="app">
        <header>
            <div class="logo">
                <span class="icon">✨</span>
                <h1>TemplateReplacer <span>Pro</span></h1>
            </div>
            <div class="actions">
                <button id="export-btn" class="primary-btn">
                    <span class="btn-icon">📥</span> 動画を出力 (Export)
                </button>
            </div>
        </header>

        <main>
            <aside class="sidebar">
                <section class="control-group" id="template-section">
                    <h3><span class="dot template"></span> 1. テンプレート (Template JSON)</h3>
                    <div class="file-input-wrapper template-border">
                        <label for="template-upload">template.json を読み込む</label>
                        <input type="file" id="template-upload" accept=".json">
                    </div>
                    <p class="hint">AEから書き出した配置情報を適用します</p>
                </section>

                <section class="control-group" data-layer="background">
                    <h3><span class="dot"></span> 2. ベース動画 (Base Video)</h3>
                    <div class="file-input-wrapper">
                        <label for="bg-upload">元動画 (MP4)</label>
                        <input type="file" id="bg-upload" accept="video/*">
                    </div>
                </section>

                <section class="control-group active" data-layer="character">
                    <h3><span class="dot highlight"></span> 3. キャラクター素材 (Character)</h3>
                    <div class="file-input-wrapper highlight-border">
                        <label for="char-upload">透過PNG / MOV素材</label>
                        <input type="file" id="char-upload" accept="video/*,image/*">
                    </div>
                </section>

                <section class="control-group" id="transform-panel">
                    <h3 class="control-title-active">位置の微調整</h3>
                    <p class="hint">キャンバス上をドラッグして顔の位置を合わせます</p>
                    <div class="transform-controls">
                        <div class="control-row">
                            <label>位置 X</label>
                            <input type="range" id="posX" min="-2000" max="2000" value="0">
                        </div>
                        <div class="control-row">
                            <label>位置 Y</label>
                            <input type="range" id="posY" min="-2000" max="2000" value="0">
                        </div>
                        <div class="control-row">
                            <label>スケール</label>
                            <input type="range" id="scale" min="0.01" max="5" step="0.01" value="1">
                        </div>

                        <div class="quick-actions">
                            <button id="center-btn" class="secondary-btn">🎯 中央に戻す</button>
                        </div>

                        <div class="chroma-settings">
                            <label class="checkbox-label">
                                <input type="checkbox" id="chroma-toggle"> クロマキー (グリーンバック除去)
                            </label>
                            <div class="control-row">
                                <label>除去色</label>
                                <input type="color" id="chroma-color" value="#00ff00">
                            </div>
                        </div>
                    </div>
                </section>
            </aside>

            <div class="editor-view">
                <div class="canvas-container" id="canvas-container">
                    <canvas id="main-canvas"></canvas>
                </div>

                <div class="timeline-bar">
                    <div class="timeline-controls">
                        <button id="play-pause-btn">▶</button>
                        <span id="time-display">00:00 / 00:00</span>
                    </div>
                    <div class="timeline-track">
                        <div id="progress-bar"></div>
                    </div>
                </div>
            </div>
        </main>

        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <p>動画を生成中... <span id="export-progress">0%</span></p>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
