<!DOCTYPE html>
<html lang='ja'>
<head>
  <meta charset='UTF-8'>
  <title>動画リサイズ＆帯合成ツール v3.0 [Filename Master]</title>
  <style>
    :root { --primary: #00b900; --bg: #1a1a1b; --panel: #2d2d2e; --white: #ffffff; --border: #3e3e3f; --glow: #00ff00; --danger: #ff4d4d; }
    body { font-family: sans-serif; background: var(--bg); color: #eee; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 320px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
    h1 { color: var(--primary); font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    .section { background: #252526; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
    .section h3 { font-size: 0.85rem; margin: 0 0 10px 0; color: var(--primary); }
    label { display: block; font-size: 0.75rem; margin-bottom: 5px; color: #aaa; }
    input[type='file'], input[type='range'], input[type='text'] { width: 100%; margin-bottom: 10px; background: #1a1a1b; color: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 6px; box-sizing: border-box; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
    .btn-main { background: var(--primary); color: white; }
    .btn-main:hover { background: #009900; }
    .btn-main:disabled { background: #333; cursor: not-allowed; }
    .btn-sub { background: #555; color: white; font-size: 0.8rem; }
    .btn-danger { background: var(--danger); color: white; font-size: 0.7rem; padding: 4px 8px; width: auto; position: absolute; top: 10px; right: 10px; border-radius: 4px; border: none; cursor: pointer; }
    .btn-fit { background: #007bff; color: white; padding: 6px; margin-bottom: 10px; border-radius: 4px; font-size: 0.75rem; border: none; cursor: pointer; }
    .main { flex: 1; display: flex; flex-direction: column; background: #000; overflow-y: auto; padding: 40px; gap: 60px; align-items: center; }
    .preview-card { background: #2d2d2e; border-radius: 16px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); width: 100%; max-width: 750px; text-align: center; border: 2px solid transparent; }
    .preview-card.snapped { border-color: var(--glow); box-shadow: 0 0 20px var(--glow); }
    .editor-viewport { position: relative; display: inline-block; padding: 120px; background: repeating-conic-gradient(#1a1a1b 0% 25%, #252526 0% 50%) 50% / 20px 20px; border-radius: 8px; margin-bottom: 15px; overflow: visible; }
    .canvas-container { position: relative; background: transparent; box-shadow: 0 0 0 1px #555; overflow: visible; }
    canvas { display: block; cursor: move; width: 100%; height: auto; max-width: 450px; }
    .size-tag { font-size: 0.9rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; display: block; }
    .progress-bar { width: 100%; height: 6px; background: #333; margin-top: 15px; border-radius: 3px; display: none; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: var(--primary); }
    .filename-box { margin-bottom: 15px; }
    .filename-box label { font-size: 0.7rem; color: #888; text-align: left; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
<div class='sidebar'>
  <h1>🎬 動画リサイズ v3.0</h1>
  <div class='section'>
    <h3>1. 動画をアップロード</h3>
    <button class='btn-danger' onclick='clearVideo()'>削除</button>
    <input type='file' id='videoInput' accept='video/*'>
    <div id='videoInfo' style='font-size:0.7rem; color:#888;'>サイズ未検出</div>
  </div>
  <div class='section'>
    <h3>2. エンドカード (MP4)</h3>
    <button class='btn-danger' onclick='clearEndCard()'>削除</button>
    <input type='file' id='endCardInput' accept='video/mp4,video/webm'>
    <div id='endCardInfo' style='font-size:0.7rem; color:#888;'>未設定</div>
  </div>
  <div class='section'>
    <h3>3. 各サイズ用の帯(PNG)</h3>
    <div style='position:relative; margin-bottom:10px;'>
      <label>SQUARE (1080x1080)</label>
      <button class='btn-danger' style='top:0; padding:2px 6px;' onclick='clearObi("1080x1080")'>削除</button>
      <input type='file' class='obi-input' id='input-1080x1080' data-size='1080x1080' accept='image/*'>
    </div>
    <div style='position:relative; margin-bottom:10px;'>
      <label>LANDSCAPE (1920x1080)</label>
      <button class='btn-danger' style='top:0; padding:2px 6px;' onclick='clearObi("1920x1080")'>削除</button>
      <input type='file' class='obi-input' id='input-1920x1080' data-size='1920x1080' accept='image/*'>
    </div>
    <div style='position:relative; margin-bottom:10px;'>
      <label>PORTRAIT (1080x1920)</label>
      <button class='btn-danger' style='top:0; padding:2px 6px;' onclick='clearObi("1080x1920")'>削除</button>
      <input type='file' class='obi-input' id='input-1080x1920' data-size='1080x1920' accept='image/*'>
    </div>
  </div>
  <div style='margin-top:auto;'>
    <button class='btn btn-main' id='exportAllBtn' disabled>🚀 全サイズを一括変換</button>
    <div id='batchStatusText' style='font-size:0.7rem; color:var(--primary); text-align:center; margin-bottom:5px;'></div>
    <div class='progress-bar' id='batchProgress' style='margin-bottom:10px;'><div class='progress-fill' id='batchProgressFill'></div></div>
    <div id='status' style='font-size:0.75rem; color:#aaa; text-align:center;'>準備ができるとボタンが有効になります</div>
  </div>
</div>
<div class='main'>
  <div class='preview-card' id='card-1080x1080'>
    <span class='size-tag'>正方形 (1080x1080)</span>
    <div class='filename-box'>
      <label>保存ファイル名 (拡張子不要)</label>
      <input type='text' class='name-input' id='name-1080x1080' placeholder='ファイル名'>
    </div>
    <button class='btn btn-fit' data-size='1080x1080'>✨ 透過枠に自動フィット</button>
    <div class='editor-viewport'><div class='canvas-container' id='container-1080x1080'></div></div>
    <div class='control-row'><span style='font-size:0.75rem'>ズーム:</span><input type='range' class='scale-slider' data-size='1080x1080' min='0.01' max='5.0' step='0.0001' style='width:150px;'></div>
    <button class='btn btn-sub save-single' data-size='1080x1080' disabled>📥 個別に保存</button>
    <div class='progress-bar'><div class='progress-fill'></div></div>
  </div>
  <div class='preview-card' id='card-1920x1080'>
    <span class='size-tag'>横長 (1920x1080)</span>
    <div class='filename-box'>
      <label>保存ファイル名 (拡張子不要)</label>
      <input type='text' class='name-input' id='name-1920x1080' placeholder='ファイル名'>
    </div>
    <button class='btn btn-fit' data-size='1920x1080'>✨ 透過枠に自動フィット</button>
    <div class='editor-viewport'><div class='canvas-container' id='container-1920x1080'></div></div>
    <div class='control-row'><span style='font-size:0.75rem'>ズーム:</span><input type='range' class='scale-slider' data-size='1920x1080' min='0.01' max='5.0' step='0.0001' style='width:150px;'></div>
    <button class='btn btn-sub save-single' data-size='1920x1080' disabled>📥 個別に保存</button>
    <div class='progress-bar'><div class='progress-fill'></div></div>
  </div>
  <div class='preview-card' id='card-1080x1920'>
    <span class='size-tag'>縦長 (1080x1920)</span>
    <div class='filename-box'>
      <label>保存ファイル名 (拡張子不要)</label>
      <input type='text' class='name-input' id='name-1080x1920' placeholder='ファイル名'>
    </div>
    <button class='btn btn-fit' data-size='1080x1920'>✨ 透過枠に自動フィット</button>
    <div class='editor-viewport'><div class='canvas-container' id='container-1080x1920'></div></div>
    <div class='control-row'><span style='font-size:0.75rem'>ズーム:</span><input type='range' class='scale-slider' data-size='1080x1920' min='0.01' max='5.0' step='0.0001' style='width:150px;'></div>
    <button class='btn btn-sub save-single' data-size='1080x1920' disabled>📥 個別に保存</button>
    <div class='progress-bar'><div class='progress-fill'></div></div>
  </div>
</div>
<script>
  let aCtx = null; let aMainSource = null; let aEndSource = null; let aDest = null;
  const state = { 
    video: document.getElementById('v-main-hidden'), 
    endCard: document.getElementById('v-end-hidden'), 
    vW: 0, vH: 0, ecW: 0, ecH: 0, baseFilename: 'video',
    slots: {
      '1080x1080': { w: 1080, h: 1080, obi: null, vx: 0, vy: 0, vs: 1.0, hole: null, canvas: null, ctx: null, blob: null },
      '1920x1080': { w: 1920, h: 1080, obi: null, vx: 0, vy: 0, vs: 1.0, hole: null, canvas: null, ctx: null, blob: null },
      '1080x1920': { w: 1080, h: 1920, obi: null, vx: 0, vy: 0, vs: 1.0, hole: null, canvas: null, ctx: null, blob: null }
    }
  };
  Object.keys(state.slots).forEach(key => {
    const s = state.slots[key]; const container = document.getElementById('container-' + key);
    const cv = document.createElement('canvas'); cv.width = s.w; cv.height = s.h; container.appendChild(cv);
    s.canvas = cv; s.ctx = cv.getContext('2d');
    let drag = false;
    cv.onmousedown = () => drag = true; window.addEventListener('mouseup', () => drag = false);
    cv.onmousemove = (e) => {
      if (!drag || !state.video) return; const r = cv.getBoundingClientRect(); const sc = cv.width / r.width;
      s.vx += e.movementX * sc; s.vy += e.movementY * sc; drawSlot(key);
    };
    cv.onwheel = (e) => {
      if (!state.video) return; e.preventDefault(); const zoom = e.deltaY > 0 ? 0.98 : 1.02; const old = s.vs; s.vs *= zoom;
      s.vx -= (state.vW * s.vs - state.vW * old) / 2; s.vy -= (state.vH * s.vs - state.vH * old) / 2;
      document.querySelector(".scale-slider[data-size='" + key + "']").value = s.vs; drawSlot(key);
    };
  });
  document.querySelectorAll('.scale-slider').forEach(sl => {
    sl.oninput = (e) => {
      const k = sl.dataset.size; const s = state.slots[k]; const old = s.vs; s.vs = parseFloat(e.target.value);
      s.vx -= (state.vW * s.vs - state.vW * old) / 2; s.vy -= (state.vH * s.vs - state.vH * old) / 2; drawSlot(k);
    };
  });
  function detectHole(img) {
    const c = document.createElement('canvas'); c.width = img.width; c.height = img.height; const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0);
    const d = ctx.getImageData(0, 0, c.width, c.height).data; const cX = Math.floor(img.width/2), cY = Math.floor(img.height/2);
    let x1=0, x2=img.width, y1=0, y2=img.height;
    const isT = (x,y) => { const i=(y*img.width+x)*4; return d[i+3]<120 || (d[i]>240 && d[i+1]>240 && d[i+2]>240); };
    for(let x=cX; x>=0; x--) if(!isT(x,cY)) { x1=x+1; break; }
    for(let x=cX; x<img.width; x++) if(!isT(x,cY)) { x2=x-1; break; }
    for(let y=cY; y>=0; y--) if(!isT(cX,y)) { y1=y+1; break; }
    for(let y=cY; y<img.height; y++) if(!isT(cX,y)) { y2=y-1; break; }
    return { x:x1, y:y1, w:x2-x1, h:y2-y1 };
  }
  function autoFit(k) {
    const s = state.slots[k]; if(!s.obi || !state.video) return; const h = detectHole(s.obi); s.hole = h;
    // 「Cover」方式でスケールを計算（穴を完全に覆う）
    s.vs = Math.max(h.w / state.vW, h.h / state.vH);
    // 穴の中央に配置
    s.vx = h.x + (h.w - state.vW * s.vs) / 2;
    s.vy = h.y + (h.h - state.vH * s.vs) / 2;
    document.querySelector(".scale-slider[data-size='" + k + "']").value = s.vs; drawSlot(k);
  }
  document.querySelectorAll('.obi-input').forEach(i => i.onchange = async (e) => {
    const k = i.dataset.size; const img = new Image(); img.src = URL.createObjectURL(e.target.files[0]);
    await new Promise(r => img.onload = r); state.slots[k].obi = img; autoFit(k); checkReady();
  });
  document.querySelectorAll('.btn-fit').forEach(b => b.onclick = () => autoFit(b.dataset.size));
  document.getElementById('videoInput').onchange = (e) => {
    const f = e.target.files[0]; if(!f) return;
    let name = f.name.substring(0, f.name.lastIndexOf('.')) || f.name;
    name = name.replace(/_1080-1080|_1080-1920|_1920-1080|_obi/g, '');
    state.baseFilename = name;
    Object.keys(state.slots).forEach(k => {
      const suffix = k.replace('x', '-');
      document.getElementById('name-' + k).value = name + '_obi_' + suffix;
    });

    const v = state.video; v.src = URL.createObjectURL(f); v.muted = true;
    v.onloadedmetadata = () => { 
      state.vW = v.videoWidth; state.vH = v.videoHeight; 
      document.getElementById('videoInfo').innerText = 'サイズ: ' + state.vW + 'x' + state.vH; 
      v.currentTime = 0.5;
      checkReady();
      const onInitialSeek = () => {
        Object.keys(state.slots).forEach(k => { if(state.slots[k].obi) autoFit(k); else drawSlot(k); });
        checkReady();
        v.removeEventListener('seeked', onInitialSeek);
      };
      v.addEventListener('seeked', onInitialSeek);
    };
  };
  document.getElementById('endCardInput').onchange = (e) => {
    const f = e.target.files[0]; if(!f) return;
    const v = state.endCard; v.src = URL.createObjectURL(f); v.muted = true;
    v.onloadedmetadata = () => { 
      state.ecW = v.videoWidth; state.ecH = v.videoHeight;
      document.getElementById('endCardInfo').innerText = 'サイズ: ' + state.ecW + 'x' + state.ecH;
      checkReady();
    };
  };
  function clearVideo() { state.video.src = ''; state.video.removeAttribute('src'); document.getElementById('videoInput').value = ''; document.getElementById('videoInfo').innerText = '削除済み'; Object.keys(state.slots).forEach(k => drawSlot(k)); checkReady(); }
  function clearEndCard() { state.endCard.src = ''; state.endCard.removeAttribute('src'); document.getElementById('endCardInput').value = ''; document.getElementById('endCardInfo').innerText = '未設定'; checkReady(); }
  function clearObi(k) { state.slots[k].obi = null; state.slots[k].hole = null; document.getElementById('input-' + k).value = ''; drawSlot(k); checkReady(); }
  function drawSlot(k, isEx = false, useEndCard = false) {
    const s = state.slots[k]; const ctx = s.ctx; ctx.save(); ctx.clearRect(0, 0, s.w, s.h);
    const v = useEndCard ? state.endCard : state.video;
    const vW = useEndCard ? state.ecW : state.vW;
    const vH = useEndCard ? state.ecH : state.vH;
    
    ctx.fillStyle = isEx ? '#000' : 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, s.w, s.h);
    if (v) { 
      ctx.globalAlpha = isEx ? 1.0 : 0.8;
      ctx.drawImage(v, s.vx, s.vy, state.vW * s.vs, state.vH * s.vs);
    }
    if (s.obi) { ctx.globalAlpha = isEx ? 1.0 : 0.5; ctx.drawImage(s.obi, 0, 0, s.w, s.h); }
    ctx.restore();
    if (!useEndCard) {
      const snapped = s.hole && Math.abs(s.vx - s.hole.x) < 1 && Math.abs(s.vy - s.hole.y) < 1;
      document.getElementById('card-' + k).classList.toggle('snapped', snapped);
    }
  }
  async function ensureAudio() {
    if (!aCtx) {
      aCtx = new (window.AudioContext || window.webkitAudioContext)();
      aDest = aCtx.createMediaStreamDestination();
      aMainSource = aCtx.createMediaElementSource(state.video);
      aMainSource.connect(aDest); aMainSource.connect(aCtx.destination);
      aEndSource = aCtx.createMediaElementSource(state.endCard);
      aEndSource.connect(aDest); aEndSource.connect(aCtx.destination);
    }
    if (aCtx.state === 'suspended') await aCtx.resume();
  }
  async function exportVideo(k) {
    const s = state.slots[k]; const card = document.getElementById('card-' + k); const fill = card.querySelector('.progress-fill'); card.querySelector('.progress-bar').style.display = 'block';
    await ensureAudio();
    
    const stream = s.canvas.captureStream(30); 
    const combined = new MediaStream([...stream.getVideoTracks(), ...aDest.stream.getAudioTracks()]);
    
    // MP4を最優先
    const types = ['video/mp4;codecs=h264,aac','video/mp4','video/webm;codecs=h264,opus','video/webm'];
    let selectedType = 'video/webm';
    for (const t of types) { if (MediaRecorder.isTypeSupported(t)) { selectedType = t; break; } }

    const rec = new MediaRecorder(combined, { mimeType: selectedType }); const chunks = [];
    rec.ondataavailable = e => chunks.push(e.data); 
    const done = new Promise(res => rec.onstop = () => res(new Blob(chunks, { type: selectedType.split(';')[0] })));
    
    rec.start(); 
    state.video.muted = false; state.video.currentTime = 0; await state.video.play();
    
    let isEndCardPlaying = false;
    const totalDuration = state.video.duration + (state.endCard ? state.endCard.duration : 0);

    const render = async () => {
      if (!isEndCardPlaying) {
        if (!state.video.paused && !state.video.ended) {
          drawSlot(k, true, false);
          fill.style.width = (state.video.currentTime / totalDuration * 100) + '%';
          requestAnimationFrame(render);
        } else {
          if (state.endCard) {
            isEndCardPlaying = true;
            state.endCard.muted = false;
            state.endCard.currentTime = 0;
            await state.endCard.play();
            requestAnimationFrame(render);
          } else {
            rec.stop();
          }
        }
      } else {
        if (!state.endCard.paused && !state.endCard.ended) {
          drawSlot(k, true, true);
          fill.style.width = ((state.video.duration + state.endCard.currentTime) / totalDuration * 100) + '%';
          requestAnimationFrame(render);
        } else {
          rec.stop();
        }
      }
    };
    render();
    s.blob = await done;
    state.video.muted = true; if(state.endCard) state.endCard.muted = true;
    drawSlot(k, false); return s.blob;
  }
  document.getElementById('exportAllBtn').onclick = async () => {
    const exportBtn = document.getElementById('exportAllBtn');
    const statusText = document.getElementById('batchStatusText');
    const batchProgress = document.getElementById('batchProgress');
    const batchFill = document.getElementById('batchProgressFill');
    
    exportBtn.disabled = true;
    batchProgress.style.display = 'block';
    
    const activeSlots = Object.keys(state.slots).filter(k => state.slots[k].obi);
    let count = 0;
    
    for (const k of activeSlots) {
      count++;
      statusText.innerText = `変換中: ${k} (${count}/${activeSlots.length})`;
      batchFill.style.width = (count / activeSlots.length * 100) + '%';
      
      const b = await exportVideo(k);
      const name = document.getElementById('name-' + k).value;
      
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = name + '.mp4';
      a.click();
      
      // 次のダウンロードまで少し待機（ブラウザの制限回避）
      await new Promise(r => setTimeout(r, 1000));
    }
    
    statusText.innerText = '一括変換完了！';
    exportBtn.disabled = false;
    setTimeout(() => {
      batchProgress.style.display = 'none';
      statusText.innerText = '';
    }, 3000);
  };
  document.querySelectorAll('.save-single').forEach(b => b.onclick = async () => { const k = b.dataset.size; const blob = await exportVideo(k); const name = document.getElementById('name-' + k).value; const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name + '.mp4'; a.click(); });
</script>
</body>
</html>
