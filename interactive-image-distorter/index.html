<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Distorter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Interactive Image Distorter <span style="font-size: 0.4em; vertical-align: middle;" class="status-badge">v1.2</span></h1>
            <p>画像をアップロードし、マウスでなぞった部分を揺らす・変形させるツールです。</p>
        </header>

        <main class="main-content">
            <div class="controls-panel">
                <div class="control-group">
                    <h3>1. 画像を読み込む</h3>
                    <input type="file" id="imageInput" accept="image/png, image/jpeg, image/bmp">
                </div>

                <div class="control-group">
                    <h3>2. モード選択</h3>
                    <div class="mode-toggles">
                        <button id="modeMask" class="active">マスク領域を指定する</button>
                        <button id="modeInteract">揺らす・変形する (Play)</button>
                    </div>
                </div>

                <div class="control-group" id="brushControls">
                    <h3>ブラシ設定 (マスク用)</h3>
                    <label>
                        サイズ: <span id="brushSizeVal">30</span>px
                        <input type="range" id="brushSize" min="5" max="100" value="30">
                    </label>
                    <button id="clearMaskBtn" class="secondary-btn">マスクをクリア</button>
                </div>

                <div class="control-group" id="distortionControls" style="display:none;">
                    <h3>変形設定 (Play用)</h3>
                    <label>
                        影響範囲: <span id="distortRadiusVal">50</span>px
                        <input type="range" id="distortRadius" min="10" max="150" value="50">
                    </label>
                    <label>
                        強さ: <span id="distortStrengthVal">5</span>
                        <input type="range" id="distortStrength" min="1" max="20" value="5">
                    </label>
                    <label>
                        弾力性 (バネ): <span id="springTensionVal">0.3</span>
                        <input type="range" id="springTension" min="0.05" max="0.9" step="0.05" value="0.3">
                    </label>
                    <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
                    <h4>自動で揺らす (Auto Wobble)</h4>
                    <label>
                        方向 (X): <input type="checkbox" id="autoWobbleX" checked>
                    </label>
                    <label>
                        方向 (Y): <input type="checkbox" id="autoWobbleY" checked>
                    </label>
                    <label>
                        スピード: <span id="autoWobbleSpeedVal">5</span>
                        <input type="range" id="autoWobbleSpeed" min="1" max="15" value="5">
                    </label>
                    <button id="toggleAutoWobbleBtn" class="action-btn" style="background-color: #f59e0b;">自動揺れ 開始</button>
                </div>

                <div class="control-group">
                    <h3>3. 録画と保存</h3>
                    <div class="record-controls">
                        <button id="recordBtn" class="action-btn">録画開始 (WebM)</button>
                        <span id="recordingStatus" class="status-indicator"></span>
                    </div>
                    <div id="downloadContainer" style="display:none; margin-top: 10px;">
                        <a id="downloadLink" class="download-btn">動画をダウンロード</a>
                    </div>
                </div>
            </div>

            <div class="canvas-container">
                <img id="bgImage" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); max-width:100%; max-height:100%; object-fit:contain; pointer-events:none; z-index:0;">
                <canvas id="mainCanvas" style="position:relative; z-index:1;"></canvas>
                <div class="placeholder-text" id="canvasPlaceholder" style="z-index:2;">画像を選択してください</div>
            </div>
        </main>
    </div>
    <script src="../sidebar.js"></script>
    <script src="main.js"></script>
</body>
</html>
