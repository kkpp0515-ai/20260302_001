<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オジサン構文メッセンジャー - LINE風ツール</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- LINE-style Header -->
        <header class="chat-header">
            <div class="header-left">
                <button class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6" />
                    </svg>
                </button>
                <div class="profile-pic">
                    <div class="avatar-fallback">👴</div>
                </div>
                <div class="user-info">
                    <h1 class="user-name">オジサン✨😃</h1>
                    <span class="status">オンライン</span>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn search-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="M21 21l-4.35-4.35" />
                    </svg>
                </button>
                <button class="icon-btn call-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                    </svg>
                </button>
                <button class="icon-btn menu-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Chat History -->
        <main class="chat-history" id="chatHistory">
            <div class="date-divider">2026年3月2日(月)</div>

            <div class="message-group received">
                <div class="avatar">👴</div>
                <div class="message-content">
                    <div class="message-bubble">
                        コンニチハ😃❗今日はナニシテルノカナ❓✨
                    </div>
                    <span class="timestamp">16:00</span>
                </div>
            </div>
        </main>

        <!-- Quick Suggestions -->
        <div class="suggestions-bar">
            <button class="suggestion-chip" data-type="greeting">挨拶</button>
            <button class="suggestion-chip" data-type="dinner">食事に誘う</button>
            <button class="suggestion-chip" data-type="advice">アドバイス</button>
            <button class="suggestion-chip" data-type="flattery">褒める</button>
        </div>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-actions-left">
                <button class="icon-btn plus-btn">+</button>
                <button class="icon-btn camera-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                </button>
                <button class="icon-btn image-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                </button>
            </div>
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="メッセージを入力..." rows="1"></textarea>
                <button class="emoji-btn">😃</button>
            </div>
            <div class="input-actions-right">
                <button id="sendBtn" class="send-btn">送信</button>
            </div>
        </footer>
    </div>

    <!-- Generator Overlay for "Tool" feel -->
    <div class="generator-settings" id="settingsOverlay" style="display:none;">
        <div class="settings-content">
            <h3>返信設定</h3>
            <label>
                オジサンの種類:
                <select id="ojisanType">
                    <option value="classic">王道オジサン</option>
                    <option value="aggressive">肉食系</option>
                    <option value="polite">丁寧だけど変</option>
                    <option value="flirty">チャラめ</option>
                </select>
            </label>
            <button id="closeSettings">閉じる</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
