<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Watermark Tool - CTW Marketing Ai Tool</title>
    <link rel="stylesheet" href="../theme.css">
    <script src="../theme-toggle.js"></script>
    <!-- JSZip for batch downloading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .editor-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
            align-items: start;
        }
        .controls {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-group label {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .control-group input[type="text"],
        .control-group input[type="number"],
        .control-group input[type="file"] {
            padding: 8px 12px;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }
        .control-group input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 0;
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
        }
        .canvas-container {
            border: 4px solid var(--border);
            background: var(--hover-bg);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            border-radius: 8px;
            box-shadow: 4px 4px 0 var(--shadow);
            overflow: auto;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px dashed var(--border);
            background-color: var(--bg);
        }
        button {
            margin-top: 16px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            background: var(--text);
            color: var(--bg);
            border: 2px solid var(--border);
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--shadow);
        }
        button:active:not(:disabled) {
            transform: translate(0, 0);
            box-shadow: 0 0 0 var(--shadow);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .file-count {
            font-size: 0.8rem;
            color: var(--text);
            margin-top: 4px;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .editor-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Watermark Tool</h1>
        <div class="editor-grid">
            <div class="controls neo-box">
                <div class="control-group">
                    <label>Image Upload (Multiple OK)</label>
                    <input type="file" id="imageInput" accept="image/*" multiple>
                    <div id="fileCountDisplay" class="file-count"></div>
                </div>
                <div class="control-group">
                    <label>Watermark Text</label>
                    <input type="text" id="textInput" value="ロゴ仮">
                </div>
                <div class="control-group">
                    <label>Text Color</label>
                    <input type="color" id="colorInput" value="#00FF00">
                </div>
                <div class="control-group">
                    <label>Font Size (px)</label>
                    <input type="number" id="sizeInput" value="80">
                </div>
                <div class="control-group">
                    <label>Border Color</label>
                    <input type="color" id="strokeColorInput" value="#000000">
                </div>
                <div class="control-group">
                    <label>Border Width (px)</label>
                    <input type="number" id="strokeWidthInput" value="4">
                </div>
                <div class="control-group">
                    <label>Padding Top/Right (px)</label>
                    <input type="number" id="paddingInput" value="20">
                </div>
                <button id="downloadBtn" class="neo-btn">Download Image</button>
            </div>
            <div class="canvas-container">
                <canvas id="previewCanvas"></canvas>
            </div>
        </div>
    </div>
    <script src="../sidebar.js"></script>
    <script src="script.js"></script>
</body>
</html>
