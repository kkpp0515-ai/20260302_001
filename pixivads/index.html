<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixiv広告CSV生成ツール v8</title>
    <link rel="stylesheet" href="../theme.css">
    <script src="../theme-toggle.js"></script>
    <style>
        body { padding: 40px 20px; max-width: 1000px; margin: 0 auto; box-sizing: border-box; }
        .form-section, .table-section { margin-bottom: 30px; padding: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 3px solid var(--border); padding: 12px; text-align: left; }
        th { background: var(--hover-bg); text-transform: uppercase; font-weight: bold; }
        textarea.neo-input { width: 100%; height: 120px; resize: vertical; margin-bottom: 15px; display: block; box-sizing: border-box; }
        .sub-section { margin-top: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; }
        .neo-input { margin-top: 5px; margin-bottom: 5px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .inline-label { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-weight: bold; }
        .inline-label .neo-input { width: auto; margin: 0; }
        h1 { margin-bottom: 30px; font-size: 2.5rem; }
        h2 { margin-bottom: 20px; font-size: 1.5rem; border-bottom: 3px solid var(--border); padding-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>Pixiv広告CSV生成ツール v8</h1>

    <div class="form-section neo-box">
        <h2>テンプレート登録</h2>
        <label>テンプレート名 <input type="text" id="templateName" class="neo-input" /></label>
        <label>appid <input type="text" id="appid" class="neo-input" /></label>
        <label class="inline-label">R18 <input type="checkbox" id="r18" style="transform: scale(1.5); margin-left:10px;" /></label>
        <label>language 
            <select id="language" class="neo-input">
                <option value="ja">ja</option>
                <option value="en">en</option>
                <option value="zh-TW">zh-TW</option>
                <option value="ko">ko</option>
            </select>
        </label>
        <label>creative_title <input type="text" id="creativeTitle" class="neo-input" /></label>
        <label>creative_text <input type="text" id="creativeText" class="neo-input" /></label>
        <div class="btn-group">
            <button onclick="saveTemplate()" class="neo-btn">テンプレート保存</button>
        </div>
    </div>

    <div class="form-section neo-box">
        <h2>テンプレート選択</h2>
        <label>使用するテンプレート 
            <select id="templateSelect" class="neo-input"></select>
        </label>
    </div>

    <div class="form-section neo-box">
        <h2>Pixiv管理画面コピー → 自動変換</h2>
        <div class="sub-section">
            <label>Pixiv管理画面からコピーした内容をここに貼り付け：</label>
            <textarea id="rawInput" class="neo-input" placeholder="38709\nクリエイティブ画像\nhighschool_ja_***.png\nスクエア..."></textarea>
            <div class="btn-group">
                <button onclick="convertPixivFormat()" class="neo-btn">変換</button>
            </div>
        </div>
        <div class="sub-section">
            <label>変換後（media_id, creative_name）：</label>
            <textarea id="bulkInput" class="neo-input" placeholder="38706, highschool_***"></textarea>
        </div>
        <div class="btn-group">
            <button onclick="processBulkInput()" class="neo-btn primary">一括登録</button>
        </div>
    </div>

    <div class="table-section neo-box">
        <h2>入力済み一覧</h2>
        <div style="overflow-x: auto;">
            <table id="entryTable">
                <thead>
                    <tr>
                        <th>category</th>
                        <th>media_id</th>
                        <th>creative_name</th>
                        <th>creative_title</th>
                        <th>creative_text</th>
                        <th>URL</th>
                        <th>CTA</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="btn-group" style="margin-top: 20px;">
            <button onclick="clearEntries()" class="neo-btn">一覧をクリア</button>
            <button onclick="downloadCSV()" class="neo-btn primary">CSV出力</button>
        </div>
    </div>

    <script>
        let templates = {};

        // 起動時に localStorage からテンプレート読み込み
        window.onload = function() {
            const saved = localStorage.getItem("pixiv_templates");
            if (saved) {
                templates = JSON.parse(saved);
                updateTemplateSelect();
            }
        };

        let entries = [];

        function updateTemplateSelect() {
            const select = document.getElementById('templateSelect');
            select.innerHTML = "";
            for (let name in templates) {
                const option = document.createElement("option");
                option.value = name;
                option.text = name;
                select.add(option);
            }
        }

        function saveTemplate() {
            const name = document.getElementById('templateName').value;
            const appid = document.getElementById('appid').value;
            const r18 = document.getElementById('r18').checked;
            const lang = document.getElementById('language').value;
            const title = document.getElementById('creativeTitle').value;
            const text = document.getElementById('creativeText').value;

            if (!name || !appid || !title || !text) {
                alert("すべての項目を入力してください");
                return;
            }

            templates[name] = {appid, r18, lang, title, text};
            localStorage.setItem("pixiv_templates", JSON.stringify(templates));
            updateTemplateSelect();
            alert("テンプレート保存しました！");
        }

        function convertPixivFormat() {
            const input = document.getElementById("rawInput").value.trim().split("\n");
            let output = "";
            for (let i = 0; i < input.length; i++) {
                const line = input[i].trim();
                if (/^\d+$/.test(line)) {
                    const mediaId = line;
                    // 次の10行以内に画像ファイルが出てくる前提
                    for (let j = i + 1; j < Math.min(i + 10, input.length); j++) {
                        const maybeImg = input[j].trim();
                        if (maybeImg.match(/\.(png|jpg|jpeg)$/i)) {
                            output += `${mediaId}, ${maybeImg}\n`;
                            i = j;
                            break;
                        }
                    }
                }
            }
            if (output === "") {
                alert("変換できるデータが見つかりませんでした。構造を確認してください。");
            }
            document.getElementById("bulkInput").value = output.trim();
        }

        function processBulkInput() {
            const templateKey = document.getElementById('templateSelect').value;
            if (!templateKey || !templates[templateKey]) {
                alert("テンプレートを選択してください");
                return;
            }
            const t = templates[templateKey];
            const lines = document.getElementById("bulkInput").value.trim().split("\n");
            lines.forEach(line => {
                const parts = line.split(",");
                if (parts.length !== 2) return;
                const mediaId = parts[0].trim();
                const creativeName = parts[1].trim();
                const campaign = `${t.appid}_${t.lang}_${t.r18 ? "NewDisplayCpaR18" : "NewDisplayCpa"}_adn_sp`;
                const url = `https://h5.g123.jp/game/${t.appid}?platform=pixiv&utm_source=pixiv&utm_campaign=${campaign}&utm_adgroup=${creativeName}&utm_content=${creativeName}`;
                const entry = ["image", mediaId, creativeName, t.title, t.text, url, "2"];
                entries.push(entry);

                const row = document.createElement("tr");
                entry.forEach(e => {
                    const cell = document.createElement("td");
                    cell.innerText = e;
                    row.appendChild(cell);
                });
                document.querySelector("#entryTable tbody").appendChild(row);
            });
        }

        function clearEntries() {
            entries = [];
            document.querySelector("#entryTable tbody").innerHTML = "";
        }

        function downloadCSV() {
            const header = ["category", "media_id", "creative_name", "creative_title", "creative_text", "URL", "CTA"];
            const rows = entries.map(e => e.map(x => `"${x.replace(/"/g, '""')}"`).join(","));
            const csv = [header.join(",")].concat(rows).join("\n");
            const blob = new Blob([csv], {type: "text/csv;charset=utf-8;"});
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", "pixiv_ad_upload.csv");
            document.body.appendChild(link);
            link.click();
        }
    </script>
    <script src="../sidebar.js"></script>
</body>
</html>
