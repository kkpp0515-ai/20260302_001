<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Banner AI Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="../" class="back-link">← CTW Tools</a>
  <h1>Ad Banner AI Generator</h1>
  <div class="api-key-section">
    <input type="password" id="apiKey" placeholder="OpenAI APIキー (sk-...)" />
    <button id="saveKey" class="btn-secondary">保存</button>
    <span id="keyStatus"></span>
  </div>
</header>

<main>

  <!-- Step 1: Upload -->
  <section id="step1" class="step active">
    <h2><span class="step-num">1</span> 参考バナーをアップロード</h2>
    <div class="upload-area" id="dropZone">
      <div class="upload-icon">📁</div>
      <p>画像をドラッグ&ドロップ<br>または</p>
      <label class="btn-primary" for="fileInput">ファイルを選択</label>
      <input type="file" id="fileInput" multiple accept="image/*" hidden>
      <p class="hint">JPG / PNG / WebP 対応（最大10枚）</p>
    </div>
    <div id="uploadedGallery" class="gallery hidden"></div>
    <button id="analyzeBtn" class="btn-primary large hidden">AI分析を開始 →</button>
  </section>

  <!-- Step 2: Analysis + Proposals -->
  <section id="step2" class="step hidden">
    <div class="two-col">

      <div class="col-left">
        <h2><span class="step-num">2</span> 参考画像</h2>
        <div id="refGallery" class="gallery small"></div>
        <div id="analysisBox" class="analysis-box hidden">
          <h3>📊 AI傾向分析</h3>
          <p id="analysisText"></p>
        </div>
      </div>

      <div class="col-right">
        <h2><span class="step-num">3</span> 提案 <span id="loadingSpinner" class="spinner hidden"></span></h2>
        <div id="proposalsGrid" class="proposals-grid"></div>
      </div>

    </div>
  </section>

  <!-- Step 3: Generated Result -->
  <section id="step3" class="step hidden">
    <h2><span class="step-num">4</span> 生成完了 (1080 × 1080)</h2>
    <div class="result-area">
      <img id="resultImage" src="" alt="生成されたバナー">
      <div class="result-actions">
        <a id="downloadBtn" href="#" class="btn-primary" download="banner_1080x1080.png">ダウンロード (PNG)</a>
        <button id="backBtn" class="btn-secondary">別の提案を選ぶ</button>
        <button id="restartBtn" class="btn-secondary">最初からやり直す</button>
      </div>
    </div>
  </section>

</main>

<!-- Generating overlay -->
<div id="generatingOverlay" class="overlay hidden">
  <div class="overlay-content">
    <div class="big-spinner"></div>
    <p>GPT Image 2.0 で生成中...</p>
    <p class="hint">通常30〜60秒かかります</p>
  </div>
</div>

<script src="script.js"></script>
<script src="../sidebar.js"></script>
</body>
</html>
